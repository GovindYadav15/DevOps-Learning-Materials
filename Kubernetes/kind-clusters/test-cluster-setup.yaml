# This is lighweight kubernetes cluster configuration file for testing purposes. 
# It defines a cluster with one control-plane node and one worker node.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: test-cluster

nodes:
- role: control-plane
  image: kindest/node:v1.31.0

- role: worker
  image: kindest/node:v1.31.0

- role: worker
  image: kindest/node:v1.31.0

- role: worker
  image: kindest/node:v1.31.0