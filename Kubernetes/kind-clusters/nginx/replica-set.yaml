apiVersion: apps/v1
kind: ReplicaSet

metadata:
  name: nginx-replicaset
  namespace: nginx

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      name: nginx-replicaset-pod
      labels:
        app: nginx

    spec:
      containers:
        - name: nginx-container
          image: nginx:latest
          ports:
            - containerPort: 80