version: "3.8"

services:
  mongodb: 
    image: mongo
    ports:
    - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: govind
    volumes:
    -  /Users/govin/OneDrive/Desktop/Devops-data-volumes:/data/db
  
  mongo-express:
    image: mongo-express
    ports:
    - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: govind
      ME_CONFIG_MONGODB_URL: "mongodb://admin:govind@mongodb:27017"
