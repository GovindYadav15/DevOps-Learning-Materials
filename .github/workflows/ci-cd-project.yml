name: ci-cd-project CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - "ci-cd-project/**"
      - ".github/workflows/ci-cd-project.yml"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "ci-cd-project/**"
      - ".github/workflows/ci-cd-project.yml"

permissions:
  contents: read

concurrency:
  group: ci-cd-project-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Node.js app
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ci-cd-project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ci-cd-project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks
        run: npm run check

      - name: Run tests
        run: npm test

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build image
        run: docker build -t tagify:${{ github.sha }} ci-cd-project
