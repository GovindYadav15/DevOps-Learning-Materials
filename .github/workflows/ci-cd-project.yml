name: ci-cd-project CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - "ci-cd-project/**"
      - ".github/workflows/ci-cd-project.yml"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "ci-cd-project/**"
      - ".github/workflows/ci-cd-project.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-cd-project-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'tagify' }}

jobs:
  test:
    name: Test Node.js app
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ci-cd-project

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ci-cd-project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks
        run: npm run check

      - name: Run tests
        run: npm test

  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      image-uri: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" ci-cd-project
          docker push "$IMAGE_URI"
          echo "uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy deployment script
        run: |
          scp -i ~/.ssh/ec2_key ci-cd-project/scripts/deploy-ec2.sh \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/deploy-ec2.sh"

      - name: Run zero-downtime deployment
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image-uri }}
          DB_URL: ${{ secrets.DB_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          DB_URL_B64="$(printf '%s' "$DB_URL" | base64 -w 0)"
          JWT_SECRET_B64="$(printf '%s' "$JWT_SECRET" | base64 -w 0)"

          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "IMAGE_URI='$IMAGE_URI' DB_URL_B64='$DB_URL_B64' JWT_SECRET_B64='$JWT_SECRET_B64' AWS_REGION='${{ env.AWS_REGION }}' bash /tmp/deploy-ec2.sh"
