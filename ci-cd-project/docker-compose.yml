services:
  app:
    build: .
    depends_on:
      - mongo
    environment:
      PORT: 4000
      DB_URL: mongodb://mongo:27017
      JWT_SECRET: change-me-in-production
    ports:
      - "4000:4000"
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
